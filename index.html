<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Type Chinese</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --ink: #2a241d;
      --muted: #756a5c;
      --line: #ece4d4;
      --paper: #f7f1e6;
      --panel: #fffaf1;
      --accent: #087b73;
      --accent-dark: #066760;
      --warm: #c94b31;
      --soft: #eef3ec;
      --shadow: 0 18px 48px rgba(72, 56, 32, 0.08);
      --shadow-soft: 0 6px 18px rgba(72, 56, 32, 0.06);
      --serif: "Fraunces", "Cormorant Garamond", Georgia, "Times New Roman", serif;
      --sans: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(1100px 480px at 12% -10%, rgba(201, 75, 49, 0.05), transparent 60%),
        radial-gradient(900px 420px at 100% 0%, rgba(8, 123, 115, 0.05), transparent 65%),
        var(--paper);
    }

    button, textarea, input, select {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .app {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 16px 0 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 48px;
      margin: 8px 0 22px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--serif);
      font-weight: 600;
      font-size: 17px;
      letter-spacing: 0.01em;
    }

    .brand-mark {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--accent);
      box-shadow: var(--shadow-soft);
    }

    .nav-cluster {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }

    .nav-link {
      padding: 9px 18px;
      color: var(--ink);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 600;
      min-width: 84px;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .nav-link:hover {
      color: var(--accent-dark);
    }

    .nav-link.active {
      background: var(--accent);
      color: #fff;
    }

    .nav-link-quiet {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 6px 4px;
      border-bottom: 1px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .nav-link-quiet:hover {
      color: var(--ink);
      border-bottom-color: var(--line);
    }

    .nav-link-quiet.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .page-view[hidden] {
      display: none;
    }

    .pane {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: transparent;
    }

    .head strong {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 19px;
      letter-spacing: 0.005em;
    }

    .tools {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .icon-btn, .text-btn {
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.15s ease;
    }

    .icon-btn {
      min-width: 40px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      place-items: center;
      font-size: 14px;
      font-weight: 700;
    }

    .text-btn {
      padding: 0 14px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 6px 14px rgba(8, 123, 115, 0.18);
    }

    .icon-btn:hover, .text-btn:hover {
      background: var(--soft);
      border-color: #cbe1dc;
    }

    .primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
      color: #fff;
    }

    .listening {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .icon-btn:active, .text-btn:active {
      transform: translateY(1px);
    }

    .workspace {
      padding: 22px 24px 26px;
    }

    .label {
      display: block;
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .pinyin-line {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    #pinyinInput {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
      background: var(--panel);
      color: var(--ink);
      font-size: 19px;
    }

    #pinyinInput:focus, #outputText:focus, #translateInput:focus, #translateOutput:focus {
      border-color: #86bfb7;
      box-shadow: 0 0 0 3px rgba(8, 123, 115, 0.12);
    }

    .candidate-bar {
      display: grid;
      gap: 8px;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 250, 241, 0.6);
      padding: 12px;
      margin-bottom: 14px;
    }

    .candidates {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .candidate {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      padding: 4px 12px;
      cursor: pointer;
      color: var(--ink);
      font-size: 15px;
    }

    .candidate:first-child {
      border-color: var(--accent);
      background: var(--soft);
    }

    .candidate span {
      color: var(--muted);
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    #outputText {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      padding: 16px;
      color: var(--ink);
      background: var(--panel);
      font-size: 22px;
      line-height: 1.7;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, sans-serif;
    }

    .translation-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 22px 24px 26px;
    }

    .translate-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .translate-toolbar select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 14px;
      outline: none;
      font-size: 13.5px;
      font-weight: 600;
    }

    #translateInput,
    #translateOutput {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      padding: 14px;
      color: var(--ink);
      background: var(--panel);
      font-size: 16px;
      line-height: 1.7;
    }

    #translateOutput {
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, sans-serif;
    }

    .analysis-box {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 250, 241, 0.6);
      padding: 14px 16px;
    }

    .analysis-box h3 {
      margin: 0 0 8px;
      font-family: var(--serif);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.005em;
    }

    .textarea-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .textarea-tools {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .small-btn {
      min-height: 30px;
      padding: 0 10px;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .char-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .char-count.over-limit {
      color: #b42318;
    }

    .analysis-box ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .analysis-box li + li {
      margin-top: 5px;
    }

    .translation-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .feedback-form {
      display: grid;
      gap: 14px;
      padding: 22px 24px 26px;
      max-width: 760px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .feedback-form input,
    .feedback-form select,
    .feedback-form textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
      padding: 10px 12px;
      font-size: 14px;
    }

    .feedback-form textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.45;
    }

    .feedback-form input:focus,
    .feedback-form select:focus,
    .feedback-form textarea:focus {
      border-color: #86bfb7;
      box-shadow: 0 0 0 3px rgba(8, 123, 115, 0.12);
    }

    .feedback-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    @media (max-width: 880px) {
      .topbar {
        display: block;
      }

      .nav-cluster {
        margin-top: 12px;
        justify-content: space-between;
      }

      .nav-actions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
      }

      .nav-link {
        min-width: 0;
        padding: 10px 6px;
      }

      .pinyin-line,
      .translation-grid {
        grid-template-columns: 1fr;
      }

      .analysis-box {
        grid-column: auto;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      #outputText {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <nav class="topbar" aria-label="Primary">
      <div class="brand" aria-label="Type Chinese"><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 17.5C7 10.5 12.5 6.5 19 6.5"/><circle cx="19" cy="6.5" r="1.6" fill="currentColor" stroke="none"/></svg></span><span class="brand-name">Type Chinese</span></div>
      <div class="nav-cluster">
        <div class="nav-actions">
          <a class="nav-link" href="#type" data-page="type">Type</a>
          <a class="nav-link" href="#translate" data-page="translate">Translate</a>
        </div>
        <a class="nav-link-quiet" href="#feedback" data-page="feedback">Feedback</a>
      </div>
    </nav>

    <section class="pane page-view" id="typePage" data-page="type" aria-label="Pinyin input app">
      <div class="head">
        <strong>Input</strong>
        <div class="tools">
          <button class="icon-btn" id="undoBtn" title="Undo last Chinese character" aria-label="Undo last Chinese character">↶ Undo</button>
          <button class="icon-btn" id="copyBtn" title="Copy Chinese output" aria-label="Copy Chinese output">⧉ Copy</button>
          <button class="text-btn" id="clearBtn">Clear</button>
        </div>
      </div>
      <div class="workspace">
        <label class="label" for="pinyinInput">Pinyin input</label>
        <div class="pinyin-line">
          <input id="pinyinInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Input">
          <button class="text-btn" id="voiceBtn" type="button" aria-pressed="false">Voice</button>
          <button class="text-btn primary" id="commitBtn">Commit</button>
        </div>

        <div class="candidate-bar" aria-live="polite">
          <div class="candidates" id="candidateList"></div>
          <div class="hint" id="candidateHint">Start typing pinyin to see Chinese candidates.</div>
        </div>

        <label class="label" for="outputText">Chinese output</label>
        <textarea id="outputText" placeholder="Output" lang="zh-CN" spellcheck="false"></textarea>
      </div>
    </section>

    <section class="pane page-view" id="translatePage" data-page="translate" aria-label="Chinese English translator" hidden>
      <div class="head">
        <strong>Chinese-English Translator</strong>
        <div class="translate-toolbar">
          <select id="translateDirection" aria-label="Translation direction">
            <option value="auto">Auto detect</option>
            <option value="en-zh">English to Chinese</option>
            <option value="zh-en">Chinese to English</option>
          </select>
          <button class="icon-btn" id="swapTranslateBtn" title="Swap translation direction" aria-label="Swap translation direction">⇄ Swap</button>
          <button class="icon-btn" id="copyTranslationBtn" title="Copy translation" aria-label="Copy translation">⧉ Copy</button>
          <button class="text-btn primary" id="translateBtn">Translate</button>
        </div>
      </div>
      <div class="translation-grid">
        <label>
          <span class="textarea-head">
            <span class="label">Source text</span>
            <span class="textarea-tools">
              <button class="text-btn small-btn" id="translateVoiceBtn" type="button" aria-pressed="false">Voice</button>
              <span class="char-count" id="translateCharCount">0/1000</span>
            </span>
          </span>
          <textarea id="translateInput" placeholder="Paste a long English or Chinese sentence here..." spellcheck="true"></textarea>
        </label>
        <label>
          <span class="label">Translation</span>
          <textarea id="translateOutput" placeholder="译文 / Translation..." readonly></textarea>
        </label>
        <div class="analysis-box">
          <h3>Long sentence support</h3>
          <ol id="sentenceAnalysis">
            <li>Paste a long sentence, then translate. The app will split clauses and preserve sentence order.</li>
          </ol>
          <div class="translation-status" id="translationStatus"></div>
        </div>
      </div>
    </section>

    <section class="pane page-view" id="feedbackPage" data-page="feedback" aria-label="Feedback form" hidden>
      <div class="head">
        <strong>Feedback</strong>
      </div>
      <form class="feedback-form" id="feedbackForm">
        <div class="form-grid">
          <label>
            <span class="label">Rating</span>
            <select name="rating" required>
              <option value="5">5 - Great</option>
              <option value="4">4 - Good</option>
              <option value="3">3 - Okay</option>
              <option value="2">2 - Hard to use</option>
              <option value="1">1 - Broken</option>
            </select>
          </label>
          <label>
            <span class="label">Type</span>
            <select name="type" required>
              <option value="missing-word">Missing word</option>
              <option value="wrong-candidate">Wrong candidate</option>
              <option value="bug">Bug</option>
              <option value="idea">Idea</option>
            </select>
          </label>
        </div>
        <label>
          <span class="label">Message</span>
          <textarea name="message" required placeholder="Tell me what pinyin or word should work better."></textarea>
        </label>
        <button class="text-btn primary" type="submit">Send Feedback</button>
        <div class="feedback-status" id="feedbackStatus" role="status"></div>
      </form>
    </section>
  </main>

    function normalize(text) {
      return text.toLowerCase().replace(/ü/g, "v").replace(/[^a-zv ]/g, "").replace(/\s+/g, " ").trim();
    }

    function compact(text) {
      return normalize(text).replace(/\s/g, "");
    }

    function segmentPinyin(raw) {
      const text = compact(raw);
      const keys = Object.keys(syllables).sort((a, b) => b.length - a.length);
      const parts = [];
      let index = 0;
      while (index < text.length) {
        const found = keys.find(key => text.startsWith(key, index));
        if (!found) return null;
        parts.push(found);
        index += found.length;
      }
      return parts;
    }

    function buildSyllableCandidates(parts) {
      if (!parts || !parts.length || !parts.every(part => syllables[part])) return [];
      const pools = parts.map(part => syllables[part].split("").slice(0, 9));
      const results = [];
      const add = candidate => {
        if (candidate && !results.includes(candidate)) results.push(candidate);
      };

      for (let offset = 0; results.length < 9 && offset < 9; offset++) {
        add(pools.map(pool => pool[offset % pool.length]).join(""));
      }

      for (let syllableIndex = 0; results.length < 9 && syllableIndex < pools.length; syllableIndex++) {
        for (let charIndex = 1; results.length < 9 && charIndex < pools[syllableIndex].length; charIndex++) {
          const candidate = pools.map((pool, index) => index === syllableIndex ? pool[charIndex] : pool[0]).join("");
          add(candidate);
        }
      }

      const walk = (index, chars) => {
        if (results.length >= 9) return;
        if (index === pools.length) {
          add(chars.join(""));
          return;
        }
        pools[index].forEach(char => walk(index + 1, [...chars, char]));
      };
      walk(0, []);

      if (parts.length === 1) pools[0].forEach(add);
      return results;
    }

    function addUnique(list, value) {
      if (value && !list.includes(value)) list.push(value);
    }

    function phrasePrefixCandidates(spaced, joined) {
      if (joined.length < 2) return [];
      const results = [];

      Object.entries(phraseMap)
        .filter(([key]) => {
          const normalizedKey = normalize(key);
          const compactKey = compact(key);
          return compactKey.startsWith(joined) || (spaced && normalizedKey.startsWith(spaced));
        })
        .sort((a, b) => compact(a[0]).length - compact(b[0]).length)
        .forEach(([, candidates]) => {
          candidates.forEach(candidate => addUnique(results, candidate));
        });

      return results.slice(0, 9);
    }

    function partialPinyinParts(raw) {
      const text = compact(raw);
      if (!text) return [];
      const keys = Object.keys(syllables);
      const candidates = [];
      const addParts = (completeParts, tail) => {
        if (!tail) return;
        keys
          .filter(key => key.startsWith(tail))
          .sort((a, b) => a.length - b.length)
          .slice(0, 6)
          .forEach(key => candidates.push([...completeParts, key]));
      };

      if (raw.includes(" ")) {
        const tokens = normalize(raw).split(" ").filter(Boolean);
        const completeParts = tokens.slice(0, -1);
        if (completeParts.every(part => syllables[part])) addParts(completeParts, tokens.at(-1));
        return candidates;
      }

      for (let split = text.length - 1; split >= 0; split--) {
        const head = text.slice(0, split);
        const tail = text.slice(split);
        const completeParts = head ? segmentPinyin(head) : [];
        if (completeParts) addParts(completeParts, tail);
        if (candidates.length) break;
      }

      return candidates;
    }

    function predictiveSyllableCandidates(raw) {
      const results = [];
      partialPinyinParts(raw).forEach(parts => {
        buildSyllableCandidates(parts).forEach(candidate => addUnique(results, candidate));
      });
      return results.slice(0, 9);
    }

    function contextCandidates() {
      const text = output.value.trim();
      if (!text) return [];
      const match = Object.keys(nextWordMap)
        .sort((a, b) => b.length - a.length)
        .find(key => text.endsWith(key));
      return match ? nextWordMap[match] : defaultNextCandidates;
    }

    function candidatesFor(raw) {
      const spaced = normalize(raw);
      const joined = compact(raw);
      if (!joined) return contextCandidates();

      const phraseHits = [
        ...(phraseMap[spaced] || []),
        ...(phraseMap[joined] || [])
      ];

      const parts = raw.includes(" ")
        ? normalize(raw).split(" ").filter(Boolean)
        : segmentPinyin(raw);

      const bySyllable = buildSyllableCandidates(parts);
      const byPhrasePrefix = phrasePrefixCandidates(spaced, joined);
      const byPrediction = predictiveSyllableCandidates(raw);

      return [...new Set([...phraseHits, ...byPhrasePrefix, ...bySyllable, ...byPrediction])].slice(0, 9);
    }

        button.addEventListener("click", () => commit(candidate));
        candidateList.appendChild(button);

      if (!input.value.trim()) {
        candidateHint.textContent = activeCandidates.length ? "Next suggestions ready." : "Start typing pinyin to see Chinese candidates.";
      } else if (activeCandidates.length) {
        candidateHint.textContent = "Press Space for the first candidate, or press a number to choose.";

      const start = output.selectionStart ?? output.value.length;
      const end = output.selectionEnd ?? output.value.length;
      output.value = output.value.slice(0, start) + text + output.value.slice(end);
      const next = start + text.length;
      output.setSelectionRange(next, next);
    }

    function commit(text = activeCandidates[0] || input.value) {
      if (!text) return;
      insertAtCursor(text);
      input.value = "";
      renderCandidates();
      input.focus();

    function hasChinese(text) {
      return /[\u3400-\u9fff]/.test(text);

    function applyVoiceText(text) {
      const clean = text.trim();
      if (!clean) return;

      if (hasChinese(clean)) {
        insertAtCursor(clean);
        input.value = "";
        renderCandidates();
        input.focus();
        return;
      }

      input.value = clean.toLowerCase().replace(/[^a-züv ]/g, " ").replace(/\s+/g, " ").trim();
      renderCandidates();

      recognition.onerror = event => {

          : "Voice input stopped.";
        setVoiceState(false, message);

      recognition.onresult = event => {
        let interim = "";
        let finalText = "";

        for (let index = event.resultIndex; index < event.results.length; index++) {
          const transcript = event.results[index][0].transcript;
          if (event.results[index].isFinal) {
            finalText += transcript;
          } else {
            interim += transcript;

        if (interim.trim()) candidateHint.textContent = interim.trim();
        if (finalText.trim()) {
          applyVoiceText(finalText);
          candidateHint.textContent = "Voice input added.";
        }

    const englishCorrectionWords = englishWordList();

    function editDistanceWithin(source, target, limit) {
      if (Math.abs(source.length - target.length) > limit) return limit + 1;

      let previous = Array.from({ length: target.length + 1 }, (_, index) => index);
      for (let sourceIndex = 1; sourceIndex <= source.length; sourceIndex++) {
        const current = [sourceIndex];
        let rowBest = current[0];
        for (let targetIndex = 1; targetIndex <= target.length; targetIndex++) {
          const cost = source[sourceIndex - 1] === target[targetIndex - 1] ? 0 : 1;
          const value = Math.min(
            previous[targetIndex] + 1,
            current[targetIndex - 1] + 1,
            previous[targetIndex - 1] + cost
          );
          current[targetIndex] = value;
          rowBest = Math.min(rowBest, value);
        }
        if (rowBest > limit) return limit + 1;
        previous = current;
      }

      return previous[target.length];
    }

    function bestEnglishCorrection(word) {
      const lower = word.toLowerCase();
      if (enZhTerms[lower] || lower.length < 4) return null;

      const maxDistance = lower.length <= 5 ? 1 : 2;
      let best = null;
      let bestDistance = maxDistance + 1;
      let tied = false;

      englishCorrectionWords.forEach(candidate => {
        if (candidate[0] !== lower[0]) return;
        const distance = editDistanceWithin(lower, candidate, maxDistance);
        if (distance < bestDistance) {
          best = candidate;
          bestDistance = distance;
          tied = false;
        } else if (distance === bestDistance) {
          tied = true;
        }
      });

      return best && !tied ? best : null;
    }

    function correctEnglishTypos(text) {
      const corrections = [];
      const correctedText = text.replace(/\b[a-z]{4,}\b/gi, word => {
        const correction = bestEnglishCorrection(word);
        if (!correction) return word;
        corrections.push({ from: word, to: correction });
        return correction;
      });

      return { text: correctedText, corrections };
    }

    function normalizeEnglishPhrase(text) {
      return text
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeChinesePhrase(text) {
      return text
        .replace(/[，。！？；、,.!?;\s]/g, "")
        .trim();
    }

    function splitSentenceParts(text) {
      const parts = [];
      const pattern = /([^.!?。！？\n]+)([.!?。！？]*)/g;
      let match;

      while ((match = pattern.exec(text)) !== null) {
        const body = match[1].trim();
        if (!body) continue;
        parts.push({
          body,
          punctuation: match[2] || ""
        });
      }

      return parts.length ? parts : [{ body: text.trim(), punctuation: "" }];
    }

    function chinesePunctuationFor(mark) {
      if (/[?？]/.test(mark)) return "？";
      if (/[!！]/.test(mark)) return "！";
      return "。";
    }

    function englishPunctuationFor(mark) {
      if (/[?？]/.test(mark)) return "?";
      if (/[!！]/.test(mark)) return "!";
      return ".";
    }

    function phraseDraft(text, direction) {
      const phraseMap = direction === "en-zh" ? enZhPhrases : zhEnPhrases;
      const normalizePhrase = direction === "en-zh" ? normalizeEnglishPhrase : normalizeChinesePhrase;
      const parts = splitSentenceParts(text);
      const translated = [];
      let matched = 0;

      parts.forEach(part => {
        const key = normalizePhrase(part.body);
        const phrase = phraseMap[key];
        if (!phrase) {
          translated.push(null);
          return;
        }

        matched += 1;
        if (direction === "en-zh") {
          translated.push(/[。！？]$/.test(phrase) ? phrase : `${phrase}${chinesePunctuationFor(part.punctuation)}`);
        } else {
          translated.push(/[.!?]$/.test(phrase) ? phrase : `${phrase}${englishPunctuationFor(part.punctuation)}`);
        }
      });

      if (!matched) return null;

      return {
        text: translated
          .map((value, index) => value || parts[index].body + parts[index].punctuation)
          .join(direction === "en-zh" ? "" : " ")
          .replace(/\s+/g, " ")
          .trim(),
        complete: matched === parts.length
      };
    }

    function localTermDraft(text, direction) {
      const map = direction === "en-zh" ? enZhTerms : zhEnTerms;
      const correctionResult = direction === "en-zh"
        ? correctEnglishTypos(text)
        : { text, corrections: [] };
      const phraseResult = phraseDraft(correctionResult.text, direction);

      if (phraseResult?.complete) {
        return {
          text: phraseResult.text,
          correctedText: correctionResult.text,
          corrections: correctionResult.corrections,
          phraseMatched: true,
          changed: true
        };
      }

      let draft = correctionResult.text;
      Object.entries(map)
        .sort((a, b) => b[0].length - a[0].length)
        .forEach(([source, target]) => {
          const escaped = escapeRegExp(source);
          const pattern = direction === "en-zh"
            ? new RegExp(`\\b${escaped}\\b`, "gi")
            : new RegExp(escaped, "g");
          draft = draft.replace(pattern, direction === "zh-en" ? ` ${target} ` : target);
        });

      if (direction === "en-zh") {
        draft = draft
          .replace(/\./g, "。")
          .replace(/,/g, "，")
          .replace(/\?/g, "？")
          .replace(/!/g, "！");
      } else {
        draft = draft
          .replace(/([A-Za-z])([\u3400-\u9fff])/g, "$1 $2")
          .replace(/([\u3400-\u9fff])([A-Za-z])/g, "$1 $2")
          .replace(/，/g, ", ")
          .replace(/。/g, ".")
          .replace(/；/g, "; ")
          .replace(/！/g, "!")
          .replace(/？/g, "?")
          .replace(/\s+/g, " ")
          .trim();
      }

      if (phraseResult && phraseResult.text.length > draft.length) {
        draft = phraseResult.text;
      }

      return {
        text: draft,
        correctedText: correctionResult.text,
        corrections: correctionResult.corrections,
        phraseMatched: Boolean(phraseResult),
        changed: draft !== text || correctionResult.text !== text
      };
    }

    function shouldUseFastLocal(text, direction, localResult) {
      if (localResult.phraseMatched) return true;
      if (localResult.corrections.length) return true;
      if (!localResult.changed) return false;

      if (direction === "zh-en") {
        return text.length <= 40 || splitLongSentence(text).length <= 1;
      }

      const words = text.match(/[a-z]+/gi) || [];
      return words.length <= 6 || text.length <= 80;
    }

    function localStatus(localResult, usedFastPath) {
      if (localResult.corrections.length) {
        const corrections = localResult.corrections
          .slice(0, 3)
          .map(({ from, to }) => `${from} -> ${to}`)
          .join(", ");
        return `Corrected ${corrections}. Showing a fast local translation.`;
      }

      if (localResult.phraseMatched) {
        return "Matched common conversation phrases. Showing a fast local translation.";
      }

      return usedFastPath
        ? "Showing a fast local translation."
        : "Full translation model was unavailable. Showing a local term-based draft and clause breakdown.";
    }

    function withTimeout(promise, timeoutMs, label) {
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          setTimeout(() => reject(new Error(`${label} timed out`)), timeoutMs);
        })
      ]);
    }

    async function getBrowserTranslator(sourceLanguage, targetLanguage) {
      const cacheKey = `${sourceLanguage}-${targetLanguage}`;
      if (translatorCache.has(cacheKey)) return translatorCache.get(cacheKey);

      const translatorApi = window.Translator || window.ai?.translator;
      if (!translatorApi?.create) return null;

      const translator = await withTimeout(
        translatorApi.create({ sourceLanguage, targetLanguage }),
        1200,
        "Translator setup"
      );
      translatorCache.set(cacheKey, translator);
      return translator;
    }

    async function translateWithServer(text, direction) {
      const response = await fetch("/api/translate", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ text, direction })
      });
      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        const error = new Error(data.setup || data.detail || data.error || "Translation service failed.");
        error.status = response.status;
        throw error;
      }

      if (!data.translation) throw new Error("Translation service returned an empty result.");
      return data;
    }

    function updateTranslateLimitState() {
      const length = translateInput.value.trim().length;
      const overLimit = length > maxTranslationChars;
      translateCharCount.textContent = `${length}/${maxTranslationChars}`;
      translateCharCount.classList.toggle("over-limit", overLimit);
      translateBtn.disabled = overLimit;
      if (overLimit) {
        translationStatus.textContent = `Text is too long. Keep each translation under ${maxTranslationChars} characters to control translation API usage.`;
      }
      return { length, overLimit };
    }

    async function translateText() {
      const text = translateInput.value.trim();
      if (!text) {
        translateOutput.value = "";
        renderSentenceAnalysis("", translateDirection.value);
        translationStatus.textContent = "Paste text first.";
        return;
      }
      const limitState = updateTranslateLimitState();
      if (limitState.overLimit) return;

      const direction = detectTranslateDirection(text);
      const [sourceLanguage, targetLanguage] = direction === "en-zh" ? ["en", "zh"] : ["zh", "en"];
      const localResult = localTermDraft(text, direction);
      renderSentenceAnalysis(text, direction);
      translationStatus.textContent = "Translating with the server model...";
      translateBtn.disabled = true;

      try {
        const serverResult = await translateWithServer(text, direction);
        translateOutput.value = serverResult.translation;
        translationStatus.textContent = `Translated with ${serverResult.providerLabel || "the server translation model"}.`;
      } catch (serverError) {
        translationStatus.textContent = "Server translation unavailable. Trying browser translation...";

        try {
          const browserTranslator = await getBrowserTranslator(sourceLanguage, targetLanguage);
          if (browserTranslator?.translate) {
            translateOutput.value = await withTimeout(
              browserTranslator.translate(text),
              2500,
              "Translation"
            );
            translationStatus.textContent = "Translated with the browser translation model.";
            return;
          }
        } catch (browserError) {
          // The local fallback below keeps the app usable without network credentials.
        }

        if (shouldUseFastLocal(text, direction, localResult)) {
          translateOutput.value = localResult.text;
          translationStatus.textContent = `${localStatus(localResult, true)} To get real translation quality, configure GOOGLE_TRANSLATE_API_KEY, DEEPL_API_KEY, or OPENAI_API_KEY.`;
        } else {
          translateOutput.value = localResult.text;
          translationStatus.textContent = `${serverError.message} Showing a weak local fallback only. Configure a real translation API for production quality.`;
        }
      } finally {
        translateBtn.disabled = false;
      }
    }

    input.addEventListener("input", renderCandidates);
    output.addEventListener("input", renderCandidates);

    input.addEventListener("keydown", event => {
      const key = event.key;
      if (key === " " && input.value.trim()) {
        event.preventDefault();
        commit();
        return;
      }

      if (/^[1-9]$/.test(key) && activeCandidates[Number(key) - 1]) {
        event.preventDefault();
        commit(activeCandidates[Number(key) - 1]);
        return;
      }

      if (key === "Enter") {
        event.preventDefault();
        commit();
        return;
      }

      if (key === "Backspace" && !input.value) {
        event.preventDefault();
        removeLastOutputChar();
        return;
      }

      if (punctuation[key]) {
        event.preventDefault();
        if (input.value.trim()) commit();
        insertAtCursor(punctuation[key]);
      }
    });

    commitBtn.addEventListener("click", () => commit());
    voiceBtn.addEventListener("click", toggleVoiceInput);
    clearBtn.addEventListener("click", () => {
      input.value = "";
      output.value = "";
      renderCandidates();
      input.focus();
    });
    undoBtn.addEventListener("click", () => {
      removeLastOutputChar();
      input.focus();
    });
    copyBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(output.value);
      copyBtn.textContent = "✓ Copied";
      setTimeout(() => { copyBtn.textContent = "⧉ Copy"; }, 900);
      input.focus();
    });

    translateInput.addEventListener("input", updateTranslateLimitState);
    updateTranslateLimitState();

    translateBtn.addEventListener("click", translateText);
    translateInput.addEventListener("keydown", event => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        event.preventDefault();
        translateText();
      }
    });
    swapTranslateBtn.addEventListener("click", () => {
      translateDirection.value = translateDirection.value === "en-zh" ? "zh-en" : "en-zh";
      const source = translateInput.value;
      translateInput.value = translateOutput.value;
      translateOutput.value = source;
      renderSentenceAnalysis(translateInput.value, detectTranslateDirection(translateInput.value));
      updateTranslateLimitState();
    });
    copyTranslationBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(translateOutput.value);
      copyTranslationBtn.textContent = "✓ Copied";
      setTimeout(() => { copyTranslationBtn.textContent = "⧉ Copy"; }, 900);
    });
    translateVoiceBtn.addEventListener("click", toggleTranslateVoiceInput);

    feedbackForm.addEventListener("submit", async event => {
      event.preventDefault();
      const data = new FormData(feedbackForm);
      const rating = data.get("rating");
      const type = data.get("type");
      const message = data.get("message");
      const title = `[Feedback] ${type}`;
      const body = [
        `Rating: ${rating}/5`,
        `Type: ${type}`,
        "",
        message
      ].join("\n");
      const url = new URL("https://github.com/yankaizhao322/Type-Chinese-Online/issues/new");
      url.searchParams.set("title", title);
      url.searchParams.set("body", body);
      url.searchParams.set("labels", "feedback");
      window.open(url.toString(), "_blank", "noopener,noreferrer");
      feedbackStatus.textContent = "Opened a GitHub issue draft for this feedback.";
    });

    renderCandidates();
    setupVoiceInput();
    setupTranslateVoiceInput();
    window.addEventListener("hashchange", renderPage);
    renderPage();
  </script>
</body>
</html>
